<!DOCTYPE html>

<script>
/* Registrar SW que sirve octree.bin desde chunks. Reload-once para que controle antes del primer fetch. */
(function(){
  if (!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('/sw-octree.js').then(function(){
    return navigator.serviceWorker.ready;
  }).then(function(){
    if (!navigator.serviceWorker.controller && !sessionStorage.getItem('swOctreeReloaded')){
      sessionStorage.setItem('swOctreeReloaded','1');
      location.reload();
    }
  }).catch(function(e){ console.warn('SW octree register failed', e); });
})();
</script>

  <link rel="stylesheet" type="text/css" href="/assets/_potree/build/potree/potree.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0F0F0F;
      overflow: hidden;
      /* En móvil: el gesto táctil debe ir a los controles de Potree (rotar/zoom/pan),
         NO al scroll de la página ni del deck que embebe este iframe. */
      touch-action: none;
      overscroll-behavior: none;
    }
    #potree_render_area {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
      touch-action: none;
    }
    /* El canvas que crea Potree dentro del render area también cede el gesto */
    #potree_render_area canvas { touch-action: none; display: block; }
    /* Hide sidebar completely — clean iframe embed */
    #sidebar_root,
    #potree_sidebar_toggle,
    #potree_map_toggle,
    .potree_sidebar_brand { display: none !important; }

    /* Minimal overlay label */
    #overlay-label {
      position: absolute;
      bottom: 10px; left: 12px;
      font-family: 'Space Grotesk', monospace, sans-serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(123, 193, 66, 0.75);
      pointer-events: none;
      z-index: 10;
    }

    /* Loading indicator */
    #loading-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0F0F0F;
      display: flex;

      border-top-color: rgba(123,193,66,0.8);

      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text {
      font-family: monospace;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    /* Mini-toolbar de medición · botones flotantes */
    #measure-toolbar {
      position: absolute;
      top: 12px; left: 12px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      z-index: 30;

    #measure-toolbar button {
      font-family: 'Space Grotesk', monospace, sans-serif;

    #measure-toolbar button:hover {

      border-color: rgba(123,193,66,0.7);
    }
    #measure-toolbar button.active {
      background: rgba(123,193,66,0.32);

    }
    #measure-toolbar button.clear {
      border-color: rgba(255,255,255,0.18);

    }
    #measure-toolbar button.clear:hover {
      background: rgba(255,80,80,0.15);

    #measure-toolbar button { white-space: nowrap; }

    /* Selector de color (clasificación / elevación) */
    #color-toggle {
      position: absolute;
      top: 12px; right: 12px;
      display: flex;
      gap: 4px;
      z-index: 30;
      background: rgba(15,15,15,0.72);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);

    }
    #color-toggle button {
      font-family: 'Space Grotesk', monospace, sans-serif;

      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);

    /* Control de densidad de puntos · point budget */

    body.ctrl-external #measure-toolbar,

    /* ──────────────────────────────────────────────────────────────────
       Móvil (≤600px) · reacomodo de overlays para que NO se enciman.
       Cluster superior compacto: toolbar (solo íconos · 1 fila) arriba-izq +
       densidad arriba-der · selector de color en 2ª fila. Cluster inferior:
       leyenda full-width abajo · cards de medición elevadas sobre la leyenda

    @media (max-width: 600px) {

      #measure-toolbar {
        top: 10px; left: 10px; right: auto;

        gap: 5px;
        max-width: calc(100% - 190px);   /* deja sitio a la densidad a la derecha */
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      #measure-toolbar::-webkit-scrollbar { display: none; }
      #measure-toolbar button { padding: 7px 10px; }
      #measure-toolbar .ti { margin-right: 0; font-size: 13px; }
      #measure-toolbar .tl { display: none; }          /* icon-only en móvil */

      /* Densidad · arriba-derecha · compacta */
      #density-control {
        top: 10px; right: 10px; left: auto;

      #color-toggle { top: 64px; right: auto; left: 10px; }

      #elevation-legend {

      }
      #elevation-legend .labels span:not(.edge-left):not(.edge-right):not(.mid) { display: none; }

      /* Cards de medición · abajo-izq · se elevan sobre la leyenda en modo elevación */
      #measure-stack {

        max-height: calc(100% - 150px);
      }
      body.elevation-on #measure-stack { bottom: 94px; }  /* sobre la leyenda full-width (≈72px alto) */
      .mi-card { width: min(220px, calc(100vw - 20px)); }
    }
  </style>

  <!-- Stack de cards de medición · bottom-left · una card por medición (se crean en JS) -->

  <!-- Overlay branding -->

  <!-- ── Dependencies (order matters for Potree 1.8) ── -->

  <!-- BinaryHeap — required internally by Potree's priority queue -->
  <script src="/assets/_potree/libs/other/BinaryHeap.js"></script>

  <!-- jQuery -->
  <script src="/assets/_potree/libs/jquery/jquery-3.1.1.min.js"></script>

  <!-- Proj4 (coordinate transforms) -->
  <script src="/assets/_potree/libs/proj4/proj4.js"></script>

  <!-- Tween (camera animations) -->
  <script src="/assets/_potree/libs/tween/tween.min.js"></script>

  <!-- ── Potree 1.8 core ── -->
  <script src="/assets/_potree/build/potree/potree.js"></script>

  <script>
    window.addEventListener('load', function () {

      // ── Viewer init ──────────────────────────────────────────────────────
      const viewer = new Potree.Viewer(
        document.getElementById('potree_render_area')
      );

      viewer.setEDLEnabled(true);
      viewer.setEDLRadius(1.4);
      viewer.setEDLStrength(0.9);
      viewer.setFOV(60);
      viewer.setPointBudget(4000000);
      viewer.setBackground('black');

      // Controles:
      // · Escritorio (mouse) → earthControls = navegación tipo Google Earth.
      // · Táctil (móvil/tablet) → earthControls queda como base INACTIVA (su
      //   update() es no-op en reposo y su drag aborta sin pivot), y un
      //   controlador táctil PROPIO estilo mapa maneja el gesto: 1 dedo = mover
      //   sobre el terreno · 2 dedos = pellizcar (zoom) + girar (yaw) + tilt
      //   (pitch). Antes earthControls no respondía al tacto de 1 dedo (drag
      //   aborta en `if(!this.pivot)return`, y el pivot solo lo setea `mousedown`
      //   que el touch nunca dispara).
      var isTouch = window.matchMedia('(pointer: coarse)').matches;
      var measuringActive = false;   // suspende la nav táctil mientras se mide
      // ?controls=external → el padre (deck) renderiza los controles ARRIBA del
      // iframe y los maneja por postMessage (en móvil, para no tapar el 3D).
      var externalControls = new URLSearchParams(location.search).get('controls') === 'external';
      if (externalControls) document.body.classList.add('ctrl-external');

      viewer.setControls(viewer.earthControls);
      window._potreeViewer = viewer;
      if (isTouch) setupMapTouchNav(viewer, function () { return measuringActive; });

      // ── Load cloud ───────────────────────────────────────────────────────
      Potree.loadPointCloud(
        '/assets/_potree/clouds/parcelas/metadata.json',
        'parcelas',
        function (e) {
          const pointcloud = e.pointcloud;
          const material   = pointcloud.material;

          material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
          material.shape         = Potree.PointShape.CIRCLE;
          material.size          = 2.0;

          // RGB por default (validado · la nube tiene color real)
          material.activeAttributeName = 'rgba';

          // Brillo del coloreado RGB (Diego: la nube se veía algo oscura · 2026-05-28).
          // rgbGamma <1 levanta midtones (natural) · rgbBrightness suma un lift leve.
          material.rgbGamma      = 0.85;
          material.rgbBrightness = 0.05;

          viewer.scene.addPointCloud(pointcloud);

          // ── Diagnóstico: atributos disponibles en la nube ────────────────
          try {
            const attrs = (pointcloud.pcoGeometry && pointcloud.pcoGeometry.pointAttributes
              && pointcloud.pcoGeometry.pointAttributes.attributes) || [];
            console.log('Potree · atributos de la nube:', attrs.map(a => a.name));
            console.log('Potree · activeAttributeName actual:', material.activeAttributeName);
          } catch (err) { console.warn('No pude listar atributos:', err); }

          // ── Cámara: oblicua picada ~50° · EarthControls-compatible ─────
          // EarthControls update() lees view.position directamente (NO usa
          // yaw/pitch/radius para derivar posición — solo los usa para orientación).
          // Para fijar framing: (1) computar posición de cámara en mundo real,
          // (2) llamar view.position.set() + view.lookAt(target).
          // view.lookAt() calcula yaw/pitch/radius desde la dirección pos→target.
          //
          // El BB usa matrixWorld — puede ser identity al momento del callback.
          // Solución: usar las coordenadas hardcodeadas del metadata + retry loop
          // con rAF hasta que la posición se estabilice (no siga en 0,0,0).
          //
          // metadata.json bbox: X [566438..567229], Y [2218173..2218964], Z [2159..2950]
          // groundZ = 2159 + 791*0.30 = 2396
          try {
            // Usar BB world si ya está disponible; fallback a metadata hardcoded
            const bb = pointcloud.boundingBox.clone().applyMatrix4(pointcloud.matrixWorld);
            let cx, cy, groundZ;
            if (bb.min.x !== 0 || bb.max.x !== 0) {
              cx      = (bb.min.x + bb.max.x) / 2;
              cy      = (bb.min.y + bb.max.y) / 2;
              const zRange = bb.max.z - bb.min.z;
              groundZ = bb.min.z + zRange * 0.30;
            } else {
              // Fallback hardcoded desde metadata.json
              cx      = (566438 + 567229) / 2;   // 566833.5
              cy      = (2218173 + 2218964) / 2;  // 2218568.5
              groundZ = 2159 + 791 * 0.30;        // ≈ 2396
            }

            // Camera position: due south of center, looking north → cloud centered L/R
            // iter-12: back to iter-10 geometry (pitch=-45°) but horizDist=220 so
            //          cloud fits fully in frame with small margin top+bottom
            const azimuth   = Math.PI * 1.0;   // camera due south, looks north
            const horizDist = 220;
            const camAlt    = 220;
            const camX = cx + horizDist * Math.cos(azimuth);  // cx - 220
            const camY = cy + horizDist * Math.sin(azimuth);  // cy
            const camZ = groundZ + camAlt;

            // THREE is NOT a global — bundled inside Potree IIFE.
            // view.lookAt(x,y,z) 3-arg form works without THREE.Vector3.

            function applyCamera() {
              const view = viewer.scene.view;
              view.position.set(camX, camY, camZ);
              view.lookAt(cx, cy, groundZ);   // cloud center at ground level
              console.log('Camera applied · pos=(' + camX.toFixed(0) + ',' + camY.toFixed(0) + ',' + camZ.toFixed(0) + ') pitch=' + (view.pitch*180/Math.PI).toFixed(1) + '° radius=' + view.radius.toFixed(1));
            }

            // Apply immediately, then re-apply after render loop starts
            applyCamera();
            setTimeout(applyCamera, 50);
            setTimeout(applyCamera, 300);
          } catch (err) {
            console.warn('No pude orientar cámara:', err);
            viewer.fitToScreen(0.4);
          }

          // ── Esconder loading overlay cuando la nube ya se AFINÓ ──────────
          // Antes se ocultaba al instante (primer nodo) → en la web el cliente
          // veía la nube "agrupada" (LOD grueso) mientras seguían llegando nodos
          // por la red. Ahora mantenemos el spinner —con contador de puntos en
          // vivo— hasta que el detalle se estabiliza (plateau) o un timeout.
          var overlay  = document.getElementById('loading-overlay');
          var loadText = document.getElementById('loading-text');
          (function waitRefined() {
            var lastPts = 0, stable = 0, t0 = Date.now();
            function countPts() {
              var pc = viewer.scene.pointclouds[0]; if (!pc) return 0;
              var s = 0, vn = pc.visibleNodes || [];
              for (var i = 0; i < vn.length; i++) { var n = vn[i]; s += (n.getNumPoints ? n.getNumPoints() : (n.numPoints || 0)); }
              return s;
            }
            var fmtM = function (n) { return n >= 1e6 ? (n / 1e6).toFixed(1) + ' M' : Math.round(n / 1e3) + ' K'; };
            function done() { if (overlay) overlay.classList.add('hidden'); }
            function tick() {
              var pts = countPts(), elapsed = Date.now() - t0;
              if (loadText && pts > 0) loadText.textContent = 'Cargando nube · ' + fmtM(pts) + ' puntos';
              var grew = pts > lastPts * 1.02 + 2000;
              if (pts > lastPts) lastPts = pts;
              stable = grew ? 0 : stable + 1;
              // afinada: estable ~2.4 s con suficientes puntos · o timeout 40 s
              if ((stable >= 4 && pts > 50000 && elapsed > 4000) || elapsed > 40000) done();
              else setTimeout(tick, 600);
            }
            setTimeout(tick, 700);
          })();

          // ── Wire toolbar de medición (Potree.measuringTool) ──────────────
          const measuringTool = viewer.measuringTool;
          const toolBtns = document.querySelectorAll('#measure-toolbar button[data-tool]');
          const presets = {
            distance: { showDistances:true,  closed:false, name:'Distancia' },
            area:     { showDistances:true,  showArea:true, closed:true, name:'Área' },
            height:   { showDistances:false, showHeight:true, closed:false, maxMarkers:2, name:'Altura' },
            point:    { showCoordinates:true, showAngles:false, showArea:false, closed:false, maxMarkers:1, name:'Punto' }
          };

          // ══ Cards info contextuales de medición (Opción B · multi-card) ═══
          // Una card por medición, apiladas bottom-left. Persisten hasta ✕/Limpiar
          // (permite comparar varias a la vez · ej. distancia + altura). Datos por
          // tipo desde measure.points[].position (UTM/m · matrixWorld identidad).
          //
          // MODO EXTERNO (`?cards=external`): en vez de dibujar las cards DENTRO del
          // visor, emite los datos por postMessage al padre (el deck las pinta junto
          // al iframe para no meter ruido visual sobre el 3D). DEFAULT = in-viewer
          // (lo que querrá cualquier visor/modelo futuro embebido o standalone).
          const externalCards = new URLSearchParams(location.search).get('cards') === 'external';
          const stack = document.getElementById('measure-stack');
          const cards = new Map();      // measure -> { id, el? }
          const idToMeasure = new Map();
          let cardIdSeq = 0;

          // Formato numérico es-MX (1,234.56)
          const nf = (n, dec) => Number(n).toLocaleString('es-MX',
            { minimumFractionDigits: dec, maximumFractionDigits: dec });
          const d2 = (a, b) => Math.hypot(b.x - a.x, b.y - a.y);            // dist planimétrica 2D
          const d3 = (a, b) => Math.hypot(b.x - a.x, b.y - a.y, b.z - a.z); // dist 3D

          function measureType(m) {
            if (m.showArea) return 'area';
            if (m.showHeight) return 'height';
            if (m.showCoordinates && m.maxMarkers === 1) return 'point';
            return 'distance';
          }

          // Calcula los datos de la card (agnóstico al render · sirve in-viewer y postMessage)
          function computeData(m) {
            const pts  = m.points.map(p => p.position);
            const type = measureType(m);
            if (type === 'point') {
              const p = pts[0];
              return { type: 'Punto', val: nf(p.z, 1), unit: 'm s.n.m.', rows: [
                ['UTM E', '<b>' + nf(p.x, 2) + '</b> m'],
                ['UTM N', '<b>' + nf(p.y, 2) + '</b> m'],
                ['Zona',  '14N · ITRF08']
              ], segs: null };
            }
            if (type === 'height') {
              const a = pts[0], b = pts[pts.length - 1];
              const dz = Math.abs(b.z - a.z), horiz = d2(a, b);
              const pend = horiz > 0 ? (dz / horiz) * 100 : 0;
              const grad = Math.atan2(dz, horiz) * 180 / Math.PI;
              return { type: 'Altura', val: nf(dz, 2), unit: 'm  Δ vertical', rows: [
                ['Pendiente',  '<b>' + nf(pend, 1) + '</b> %'],
                ['Ángulo',     '<b>' + nf(grad, 1) + '</b>°'],
                ['Horizontal', nf(horiz, 2) + ' m']
              ], segs: null };
            }
            if (type === 'area') {
              const area = m.getArea(), ha = area / 10000;   // planimétrica (shoelace x,y)
              let perim = 0;
              for (let i = 1; i < pts.length; i++) perim += d2(pts[i - 1], pts[i]);
              if (pts.length > 2) perim += d2(pts[pts.length - 1], pts[0]);
              const segs = [];
              for (let i = 1; i < pts.length; i++) segs.push(['Lado ' + i, nf(d2(pts[i-1], pts[i]), 1) + ' m']);
              if (pts.length > 2) segs.push(['Lado ' + pts.length + ' (cierre)', nf(d2(pts[pts.length-1], pts[0]), 1) + ' m']);
              return { type: 'Área', val: nf(area, area >= 10000 ? 0 : 1), unit: 'm²', rows: [
                ['Hectáreas', '<b>' + nf(ha, 3) + '</b> ha'],
                ['Perímetro', nf(perim, 1) + ' m'],
                ['Vértices',  pts.length]
              ], segs: pts.length > 1 ? segs : null };
            }
            // distance
            const total = m.getTotalDistance();   // 3D
            let zMin = Infinity, zMax = -Infinity;
            pts.forEach(p => { zMin = Math.min(zMin, p.z); zMax = Math.max(zMax, p.z); });
            const desnivel = (pts.length > 1) ? (zMax - zMin) : 0;
            const segs = [];
            for (let i = 1; i < pts.length; i++) segs.push(['Tramo ' + i, nf(d3(pts[i-1], pts[i]), 2) + ' m']);
            return { type: 'Distancia', val: nf(total, 2), unit: 'm  (3D)', rows: [
              ['Tramos',   Math.max(0, pts.length - 1)],
              ['Desnivel', '<b>' + nf(desnivel, 2) + '</b> m']
            ], segs: pts.length > 1 ? segs : null };
          }

          function rowsHTML(pairs) {
            return pairs.map(([k, v]) =>
              `<div class="mi-row"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('');
          }
          function segsHTML(segs) {
            return segs.map(([k, v]) =>
              `<div class="seg"><span>${k}</span><span class="v">${v}</span></div>`).join('');
          }

          function cardTemplate() {
            const el = document.createElement('div');
            el.className = 'mi-card';
            el.innerHTML =
              '<div class="mi-head">' +
                '<div class="mi-type"><span class="dot"></span><span class="mi-type-label">Medición</span></div>' +
                '<button class="mi-close" aria-label="Cerrar medición" title="Cerrar">✕</button>' +
              '</div>' +
              '<div class="mi-primary"><span class="val">—</span><span class="unit"></span></div>' +
              '<div class="mi-rows"></div>' +
              '<div class="mi-segs" style="display:none"></div>';
            return el;
          }

          function paintCard(el, data) {
            el.querySelector('.mi-type-label').textContent = data.type;
            el.querySelector('.mi-primary .val').textContent = data.val;
            el.querySelector('.mi-primary .unit').textContent = data.unit;
            el.querySelector('.mi-rows').innerHTML = rowsHTML(data.rows);
            const seg = el.querySelector('.mi-segs');
            if (data.segs && data.segs.length) { seg.innerHTML = segsHTML(data.segs); seg.style.display = 'flex'; }
            else { seg.innerHTML = ''; seg.style.display = 'none'; }
          }

          function renderCard(m) {
            const entry = cards.get(m);
            if (!entry || !m.points || m.points.length === 0) return;
            const data = computeData(m);
            if (externalCards) {
              parent.postMessage({ source: 'potree-cards', action: 'render', id: entry.id, data }, '*');
            } else if (entry.el) {
              paintCard(entry.el, data);
            }
          }

          function openCard(m) {
            let entry = cards.get(m);
            if (!entry) {
              entry = { id: ++cardIdSeq };
              cards.set(m, entry);
              idToMeasure.set(entry.id, m);
              if (!externalCards) {
                const el = cardTemplate();
                el.querySelector('.mi-close').addEventListener('click', () => closeCard(m));
                stack.appendChild(el);            // se apila debajo (más nueva junto al ancla)
                entry.el = el;
                document.body.classList.add('measure-open');
              }
            }
            renderCard(m);
            if (entry.el) entry.el.scrollIntoView({ block: 'nearest' });
            return entry;
          }
          function closeCard(m) {
            const entry = cards.get(m);
            if (!entry) return;
            if (entry.el) entry.el.remove();
            if (externalCards) parent.postMessage({ source: 'potree-cards', action: 'close', id: entry.id }, '*');
            idToMeasure.delete(entry.id);
            cards.delete(m);
            if (cards.size === 0) document.body.classList.remove('measure-open');
          }
          function closeAllCards() {
            if (externalCards) parent.postMessage({ source: 'potree-cards', action: 'clear' }, '*');
            cards.forEach((e) => { if (e.el) e.el.remove(); });
            cards.clear();
            idToMeasure.clear();
            document.body.classList.remove('measure-open');
          }

          // Modo externo: el padre (deck) avisa cuando el usuario cierra una card con su ✕
          if (externalCards) {
            window.addEventListener('message', (e) => {
              const d = e.data;
              if (!d || d.source !== 'potree-cards-cmd') return;
              if (d.action === 'close') { const m = idToMeasure.get(d.id); if (m) closeCard(m); }
            });
          }

          // ⚠ NO usar viewer.inputHandler.toggleSelection() con mediciones: el
          // TransformationTool lee selection[0].boundingBox.getCenter() cada frame
          // y los spheres de Measure NO tienen boundingBox → crash + overlay de error.
          // Usamos el evento 'click' del sphere (lo dispara onMouseUp sin tocar la
          // selección) para abrir/refrescar su card. Las cards persisten hasta ✕/Limpiar.
          function attachClick(sphere, m) {
            if (!sphere || sphere.__clkAttached) return;
            sphere.__clkAttached = true;
            sphere.userData.__measure = m;
            sphere.addEventListener('click', () => openCard(m));   // 'click' = onMouseUp · sin selección
          }

          // Wirea una medición: clickeable (re-ver) + refresco en vivo de su card.
          function wireMeasure(m) {
            if (m.__wired) return;
            m.__wired = true;
            m.spheres.forEach((s) => attachClick(s, m));
            m.addEventListener('marker_added', (e) => attachClick(e.sphere, m));
            const refresh = () => { if (cards.has(m)) renderCard(m); };
            ['marker_added','marker_dropped','marker_moved','marker_removed']
              .forEach((ev) => m.addEventListener(ev, refresh));
          }

          // Wirea mediciones existentes y futuras (las de la toolbar pasan por aquí
          // vía 'measurement_added'). Al remover una medición, cierra su card.
          viewer.scene.measurements.forEach(wireMeasure);
          viewer.scene.addEventListener('measurement_added',   (e) => { if (e.measurement) wireMeasure(e.measurement); });
          viewer.scene.addEventListener('measurement_removed', (e) => { if (e.measurement) closeCard(e.measurement); });

          // Activación de herramienta (reusable: botones in-iframe + comandos externos del deck)
          function clearMeasurements() {
            viewer.scene.measurements.slice().forEach(m => viewer.scene.removeMeasurement(m));
            toolBtns.forEach(b => b.classList.remove('active'));
            closeAllCards();
            measuringActive = false;   // reanuda la navegación táctil
            if (externalControls) parent.postMessage({ source:'potree-state', action:'tool', value:null }, '*');
          }
          function activateTool(tool) {
            if (tool === 'clear') { clearMeasurements(); return; }
            toolBtns.forEach(b => b.classList.toggle('active', b.dataset.tool === tool));
            measuringActive = true;    // mientras se mide, el gesto coloca puntos (no navega)
            const m = measuringTool.startInsertion(presets[tool]);
            wireMeasure(m);
            openCard(m);   // feedback en vivo: la card aparece y se actualiza al colocar puntos
          }
          toolBtns.forEach(btn => btn.addEventListener('click', () => activateTool(btn.dataset.tool)));

          // ── Leyenda de elevación (solo visible en modo 'elevation') ─────
          const legend  = document.getElementById('elevation-legend');
          const teNodes = [0,1,2,3,4].map(i => document.getElementById('ele-t' + i));
          function updateElevationLegend(attr) {
            // Marca en el body para que el CSS móvil eleve las cards sobre la leyenda
            document.body.classList.toggle('elevation-on', attr === 'elevation');
            const isElev = attr === 'elevation';
            let ticks = null;
            if (isElev) {
              // Lee elevationRange real del material (Potree lo inicializa desde bbox.z)
              let lo = null, hi = null;
              try {
                const r = material.elevationRange;
                if (Array.isArray(r) && r.length === 2) { lo = r[0]; hi = r[1]; }
              } catch (e) { /* noop */ }
              if (lo == null || hi == null) { lo = 2159; hi = 2950; }   // fallback metadata.json

              const t = (frac) => Math.round(lo + (hi - lo) * frac);
              ticks = [t(0), t(0.25), t(0.5), t(0.75), t(1)];
              // Bordes con sufijo 'm'; intermedios solo número (el header ya dice 'm s.n.m.')
              teNodes[0].textContent = ticks[0] + ' m';
              teNodes[1].textContent = ticks[1];
              teNodes[2].innerHTML   = '<b>' + ticks[2] + '</b>';
              teNodes[3].textContent = ticks[3];
              teNodes[4].textContent = ticks[4] + ' m';
              legend.classList.add('visible');
              legend.setAttribute('aria-hidden', 'false');
            } else {
              legend.classList.remove('visible');
              legend.setAttribute('aria-hidden', 'true');
            }
            // En modo externo, el padre (deck) pinta la leyenda arriba del iframe
            if (externalControls) parent.postMessage({ source:'potree-state', action:'legend', visible:isElev, ticks }, '*');
          }

          // ── Color (RGB ↔ Clasif ↔ Elevación) · reusable in-iframe + externo ──
          const colorBtns = document.querySelectorAll('#color-toggle button[data-color]');
          function applyColor(value) {
            colorBtns.forEach(b => b.classList.toggle('active', b.dataset.color === value));
            material.activeAttributeName = value;
            updateElevationLegend(value);
          }
          colorBtns.forEach(btn => btn.addEventListener('click', () => applyColor(btn.dataset.color)));
          // Estado inicial (RGB por default · leyenda oculta)
          updateElevationLegend(material.activeAttributeName);

          // ── Wire density slider (point budget) ──────────────────────────
          const dSlider = document.getElementById('density-slider');
          const dValue  = document.getElementById('density-value');
          function fmtBudget(v) {
            return v >= 1000000
              ? (v / 1000000).toFixed(v % 1000000 === 0 ? 0 : 1) + ' M'
              : (v / 1000).toFixed(0) + ' K';
          }
          function applyDensity(v) {
            v = parseInt(v, 10);
            if (!v) return;
            viewer.setPointBudget(v);
            if (dValue)  dValue.textContent = fmtBudget(v);
            if (dSlider) dSlider.value = v;
          }
          dSlider.addEventListener('input', () => applyDensity(dSlider.value));
          // Sync inicial: el slider ya marca 4M = lo que ya setteamos arriba
          dValue.textContent = fmtBudget(parseInt(dSlider.value, 10));

          // ── Comandos del padre (modo ?controls=external · controles arriba del iframe) ──
          if (externalControls) {
            window.addEventListener('message', (e) => {
              const d = e.data;
              if (!d || d.source !== 'potree-ctrl') return;
              if      (d.action === 'color')    applyColor(d.value);
              else if (d.action === 'density')  applyDensity(d.value);
              else if (d.action === 'tool')     activateTool(d.value);
              else if (d.action === 'clear')    clearMeasurements();
              else if (d.action === 'stoptool') { measuringActive = false; toolBtns.forEach(b => b.classList.remove('active')); }  // reanuda nav sin borrar
            });
          }

          console.log('Potree cloud loaded · earthControls' + (isTouch ? ' + map-touch' : '') + (externalControls ? ' + external-controls' : ''));
        }
      );

      // No cargar sidebar de Potree (UI propia)
      viewer.loadGUI = function () {};

      // ══ Controlador táctil estilo mapa (móvil) ════════════════════════════
      // earthControls queda como base inactiva (no-op en reposo · su drag aborta
      // sin pivot). Aquí manejamos el gesto directo sobre viewer.scene.view:
      //   · 1 dedo  → desplazar sobre el terreno (view.pan, escalado por radius)
      //   · 2 dedos → pellizcar = zoom · girar = yaw · arrastrar vertical = tilt
      //               todo alrededor del punto que mira la cámara (getPivot).
      // Permite acercarse MUCHO más (radius mín 0.8 m). Vectores construidos con
      // los métodos de las instancias Vector3 (THREE no es global): clone/set/etc.
      function setupMapTouchNav(viewer, isMeasuring) {
        const el = viewer.renderer.domElement;
        const MIN_R = 0.8, MAX_R = 6000;
        let mode = 0, p = null;
        const dist = (t) => Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
        const mid  = (t) => ({ x:(t[0].clientX+t[1].clientX)/2, y:(t[0].clientY+t[1].clientY)/2 });
        const ang  = (t) => Math.atan2(t[1].clientY - t[0].clientY, t[1].clientX - t[0].clientX);

        function start(e) {
          if (isMeasuring()) return;       // dejar que el tap coloque puntos de medición
          const t = e.touches;
          if (t.length === 1) { mode = 1; p = { x:t[0].clientX, y:t[0].clientY }; e.preventDefault(); }
          else if (t.length >= 2) { mode = 2; p = { d:dist(t), m:mid(t), a:ang(t) }; e.preventDefault(); }
        }
        function move(e) {
          if (isMeasuring() || !mode) return;
          const t = e.touches, v = viewer.scene.view;
          const W = el.clientWidth || 1, H = el.clientHeight || 1;
          if (mode === 1 && t.length === 1) {
            const dx = t[0].clientX - p.x, dy = t[0].clientY - p.y;
            p = { x:t[0].clientX, y:t[0].clientY };
            const g = v.radius * 1.6;       // pan ∝ distancia → se siente consistente a cualquier zoom
            v.pan(-(dx / W) * g, (dy / H) * g);   // el terreno sigue al dedo
            e.preventDefault();
          } else if (mode === 2 && t.length >= 2) {
            const d = dist(t), m = mid(t), a = ang(t);
            const pivot = v.getPivot();                 // punto que mira la cámara
            const toCam = v.position.clone().sub(pivot);
            const Z = v.position.clone().set(0, 0, 1);   // eje vertical mundo
            // zoom: escala distancia cámara↔pivote
            let len = toCam.length();
            if (p.d > 0 && d > 0) len = Math.max(MIN_R, Math.min(MAX_R, len * (p.d / d)));
            // girar (yaw): twist de los 2 dedos alrededor del eje vertical
            toCam.applyAxisAngle(Z, -(a - p.a));
            // tilt (pitch): arrastre vertical del punto medio · sin voltear bajo el horizonte
            const side = toCam.clone().cross(Z);
            if (side.length() > 1e-6) {
              side.normalize();
              const dPitch = ((m.y - p.m.y) / H) * 2.2;
              const test = toCam.clone().applyAxisAngle(side, dPitch);
              if (test.z > 0.05 * test.length()) toCam.applyAxisAngle(side, dPitch);
            }
            toCam.normalize().multiplyScalar(len);
            v.position.copy(pivot.clone().add(toCam));
            v.lookAt(pivot.x, pivot.y, pivot.z);          // recomputa yaw/pitch/radius coherentes
            p = { d:d, m:m, a:a };
            e.preventDefault();
          }
        }
        function end(e) {
          const t = e.touches;
          if (t.length === 0) mode = 0;
          else if (t.length === 1) { mode = 1; p = { x:t[0].clientX, y:t[0].clientY }; }
          else { mode = 2; p = { d:dist(t), m:mid(t), a:ang(t) }; }
        }
        el.addEventListener('touchstart',  start, { passive:false });
        el.addEventListener('touchmove',   move,  { passive:false });
        el.addEventListener('touchend',    end,   { passive:false });
        el.addEventListener('touchcancel', end,   { passive:false });
      }

    });
  </script>
</body>
</html>
